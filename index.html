<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProTask | Premium To-Do List</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>ProTask</h1>
        </header>

        <section class="input-section">
            <div class="input-group">
                <input type="text" id="task-input" placeholder="What needs to be done?">
                <div class="input-meta">
                    <input type="date" id="due-date-input" aria-label="Due date">
                    <select id="priority-select" aria-label="Priority">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
                <div class="input-actions">
                    <button id="add-task-btn" class="primary-btn">Add Task</button>
                </div>
            </div>
        </section>

        <section class="search-section">
            <input type="text" id="search-input" placeholder="Search tasks">
        </section>

        <section class="filter-section">
            <div class="filters">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="pending">Pending</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>
            <button id="clear-completed" class="text-btn">Clear Completed</button>
        </section>

        <main class="task-list-container">
            <ul id="task-list"></ul>
            <div id="empty-state" class="hidden">
                <p>You're all caught up. Add a new task to get started.</p>
            </div>
        </main>

        <footer class="footer">
            <div class="stats">
                <span id="total-stats">Total: 0</span>
                <span id="pending-stats">Pending: 0</span>
                <span id="completed-stats">Completed: 0</span>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
